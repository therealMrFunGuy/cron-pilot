services:
  cronpilot:
    build: .
    container_name: mfg-cronpilot
    restart: unless-stopped
    ports:
      - "8440:8440"
    volumes:
      - cronpilot-data:/data/cronpilot
    environment:
      - PORT=8440
      - CRONPILOT_DB=/data/cronpilot/cronpilot.db
      - MAX_JOBS_FREE=10
      - MAX_RUNS_PER_DAY=100
      - DEFAULT_TIMEOUT=30
    cpus: 1
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8440/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  cronpilot-data:
